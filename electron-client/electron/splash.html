<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b;
    color: #fff;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
    -webkit-app-region: drag;
  }
  .logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: #fff; margin-bottom: 6px; }
  .logo span { color: #22c55e; }
  .sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 28px; letter-spacing: 0.3px; transition: color 0.3s; }
  .track { width: 180px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
  .bar { height: 100%; width: 45%; background: linear-gradient(90deg, transparent, #22c55e, transparent); border-radius: 99px; animation: sweep 1.4s ease-in-out infinite; }
  @keyframes sweep { 0% { transform: translateX(-120%); } 100% { transform: translateX(280%); } }
  .version { position: absolute; bottom: 16px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; }
  .warn { font-size: 11px; color: rgba(255, 180, 0, 0.8); max-width: 260px; text-align: center; line-height: 1.5; display: none; }
</style>
</head>
<body>
  <div class="logo">Atlas<span>Craft</span></div>
  <div class="sub" id="status">Starting backend…</div>
  <div class="track"><div class="bar" id="bar"></div></div>
  <div class="warn" id="warn">
    Backend startet langsam.<br>
    Bitte kurz warten oder Antivirus prüfen.
  </div>
  <div class="version">v1.0.1</div>
  <script>
    // Show warning after 12 seconds if still on splash
    setTimeout(() => {
      const w = document.getElementById('warn');
      const s = document.getElementById('status');
      if (w) w.style.display = 'block';
      if (s) s.style.color = 'rgba(255,180,0,0.7)';
    }, 12000);
  </script>
</body>
</html>
