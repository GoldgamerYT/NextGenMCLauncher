<svg id="svg-full" width="500" height="150" viewBox="0 0 500 150" xmlns="http://www.w3.org/2000/svg">
                    <!-- Wir binden die Font direkt ins SVG ein, damit sie beim Download funktioniert -->
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&amp;display=swap');
                    </style>
                    <defs>
                        <linearGradient id="grad-full" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#059669;stop-opacity:1"></stop>
                            <stop offset="100%" style="stop-color:#6EE7B7;stop-opacity:1"></stop>
                        </linearGradient>
                        <filter id="glow-full" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                        </filter>
                    </defs>
                    <g transform="translate(40, 25)">
                        <path d="M50 85 L15 65 L15 35 L50 15 L85 35 L85 65 Z" fill="none" stroke="url(#grad-full)" stroke-width="2" opacity="0.3"></path>
                        <path d="M50 70 L30 60 L30 40 L50 30 L70 40 L70 60 Z" fill="url(#grad-full)" filter="url(#glow-full)"></path>
                        <path d="M50 70 L50 50 L70 40" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"></path>
                        <path d="M30 40 L50 50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"></path>
                        <path d="M25 75 L15 70 L15 60 L25 65 Z" fill="#059669" opacity="0.8"></path>
                        <path d="M75 25 L85 30 L85 20 L75 15 Z" fill="#6EE7B7" opacity="0.8"></path>
                        <path d="M25 25 L30 28 L20 28 Z" fill="#6EE7B7" opacity="0.6"></path>
                        <path d="M10 50 A 40 40 0 0 1 50 10" fill="none" stroke="url(#grad-full)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 10" opacity="0.6"></path>
                        <path d="M90 50 A 40 40 0 0 1 50 90" fill="none" stroke="url(#grad-full)" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 15" opacity="0.6"></path>
                    </g>
                    <g transform="translate(150, 40)">
                        <text x="0" y="55" font-family="'Montserrat', sans-serif" font-weight="900" font-size="60" fill="white" letter-spacing="4">ATLAS</text>
                        <text x="5" y="90" font-family="'Montserrat', sans-serif" font-weight="300" font-size="24" fill="url(#grad-full)" letter-spacing="12" text-transform="uppercase">CRAFT</text>
                    </g>
                </svg>